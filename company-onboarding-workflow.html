<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Onboarding Workflow Demo</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        canvas {
            border-radius: 24px;
            box-shadow: 0 32px 64px rgba(0,0,0,0.4);
            max-width: 100vw;
            max-height: 100vh;
        }
    </style>
</head>
<body>
    <canvas id="canvas" width="1920" height="1080"></canvas>
    <script>
        const canvas = document.getElementById('canvas') as HTMLCanvasElement;
        const ctx = canvas.getContext('2d')!;
        
        let time = 0;
        let phase = 0; // 0: landing, 1: form error, 2: form success, 3: dashboard
        let formData = ['', '', '', ''];
        const dummyData = ['John Doe', 'dummy@company.com', 'password123', 'password123'];

        // Resize
        const resize = () => {
            const rect = canvas.getBoundingClientRect();
            canvas.width = Math.min(1920, rect.width);
            canvas.height = Math.min(1080, rect.height * (1080 / 1920));
        };
        resize();
        window.addEventListener('resize', resize);

        function drawLanding(t: number) {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            // BG gradient
            const bgGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            bgGradient.addColorStop(0, '#f8fafc');
            bgGradient.addColorStop(1, '#e2e8f0');
            ctx.fillStyle = bgGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Card
            ctx.fillStyle = 'white';
            ctx.shadowColor = 'rgba(0,0,0,0.15)';
            ctx.shadowBlur = 30;
            ctx.shadowOffsetY = 15;
            ctx.fillRect(centerX - 400, centerY - 250, 800, 500);
            ctx.shadowBlur = 0;

            // Title
            ctx.fillStyle = '#1e293b';
            ctx.font = 'bold 48px Segoe UI';
            ctx.textAlign = 'center';
            ctx.fillText('No Company Found', centerX, centerY - 100);

            // Subtitle
            ctx.fillStyle = '#64748b';
            ctx.font = '28px Segoe UI';
            ctx.fillText("You don't belong to any company workspace yet.", centerX, centerY - 50);

            // Button
            const btnProgress = Math.min(1, t / 4);
            const btnScale = 1 + 0.05 * Math.sin(t * 5);
            ctx.save();
            ctx.translate(centerX, centerY + 50);
            ctx.scale(btnScale, btnScale * btnProgress);
            ctx.fillStyle = '#3b82f6';
            ctx.shadowColor = '#3b82f6';
            ctx.shadowBlur = 20;
            ctx.fillRect(-140, -25, 280, 50);
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'white';
            ctx.font = 'bold 20px Segoe UI';
            ctx.fillText('Create a Company', 0, 10);
            ctx.restore();

            // Click effect
            if (t > 4) phase = 1;
        }

        function drawForm(t: number, errorMode: boolean) {
            const formX = canvas.width * 0.2;
            const formY = canvas.height * 0.25;
            const width = canvas.width * 0.6;
            const fieldH = 65;

            // Card
            ctx.fillStyle = 'white';
            ctx.shadowColor = 'rgba(0,0,0,0.15)';
            ctx.shadowBlur = 30;
            ctx.shadowOffsetY = 15;
            ctx.fillRect(formX, formY, width, 380);
            ctx.shadowBlur = 0;

            // Title
            ctx.fillStyle = '#1e293b';
            ctx.font = 'bold 36px Segoe UI';
            ctx.textAlign = 'center';
            ctx.fillText('Create Company Account', formX + width/2, formY + 60);

            // Fields
            const fields = [
                { label: 'Admin Full Name', value: formData[0] },
                { label: 'Work Email', value: formData[1] },
                { label: 'Password', value: formData[2] ? '•'.repeat(formData[2].length) : '' },
                { label: 'Confirm Password', value: formData[3] ? '•'.repeat(formData[3].length) : '' }
            ];

            fields.forEach((field, i) => {
                const y = formY + 100 + i * fieldH;
                const fillP = Math.min(1, (t - i*1.5) / 3);
                const fieldVal = field.value || dummyData[i].substring(0, Math.floor(fillP * dummyData[i].length));
                formData[i] = fieldVal;

                // Label
                ctx.fillStyle = '#6b7280';
                ctx.font = '500 15px Segoe UI';
                ctx.textAlign = 'left';
                ctx.fillText(field.label, formX + 40, y - 25);

                // Input
                ctx.fillStyle = errorMode ? 'rgba(239,68,68,0.1)' : 'rgba(248,250,252,1)';
                ctx.fillRect(formX + 40, y - 50, width - 80, 45);
                ctx.strokeStyle = errorMode ? '#ef4444' : '#d1d5db';
                ctx.lineWidth = 2;
                ctx.strokeRect(formX + 40, y - 50, width - 80, 45);

                ctx.fillStyle = '#374151';
                ctx.font = 'bold 18px Segoe UI';
                ctx.textAlign = 'left';
                ctx.fillText(fieldVal, formX + 55, y - 28);
            });

            // Button
            const btnT = t - 8;
            const btnP = Math.min(1, btnT / 1.5);
            ctx.fillStyle = '#3b82f6';
            ctx.shadowColor = '#3b82f6';
            ctx.shadowBlur = 20;
            ctx.fillRect(formX + width / 2 - 120 * btnP, formY + 320, 240, 55);
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'white';
            ctx.font = 'bold 20px Segoe UI';
            ctx.textAlign = 'center';
            ctx.fillText('Create Account', formX + width / 2, formY + 355);

            if (btnT > 1.5) {
                if (errorMode) {
                    // Error shake
                    const shake = Math.sin(t * 25) * 8;
                    ctx.save();
                    ctx.translate(shake, 0);
                } else {
                    phase = 2;
                }
            }
            ctx.restore();
        }

        function drawDashboard(t: number) {
            const dashX = canvas.width * 0.1;
            const dashY = canvas.height * 0.1;
            const transP = Math.min(1, (t - 12) / 2);

            ctx.save();
            ctx.scale(transP, transP);

            // Dashboard BG
            const dashGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            dashGradient.addColorStop(0, 'rgba(15,23,42,0.98)');
            dashGradient.addColorStop(1, 'rgba(30,41,59,0.98)');
            ctx.fillStyle = dashGradient;
            ctx.fillRect(dashX, dashY, canvas.width * 0.8, canvas.height * 0.8);

            // Floating panels
            const panels = [
                { x: 100, y: 120, title: 'Total Candidates', value: 2847, color: '#3b82f6' },
                { x: 350, y: 120, title: 'Strong Hire %', value: 87.3, color: '#10b981' },
                { x: 600, y: 120, title: 'Hire Rate %', value: 94.2, color: '#f59e0b' },
                { x: 100, y: 300, title: 'Active Users', value: 24, color: '#ef4444' }
            ];

            panels.forEach((panel, i) => {
                const float = Math.sin(t * 2 + i) * 8;
                ctx.save();
                ctx.translate(dashX + panel.x, dashY + panel.y + float);
                ctx.shadowColor = panel.color;
                ctx.shadowBlur = 25;
                ctx.fillStyle = 'rgba(255,255,255,0.12)';
                ctx.fillRect(0, 0, 240, 140);
                ctx.shadowBlur = 0;
                ctx.strokeStyle = 'rgba(255,255,255,0.25)';
                ctx.lineWidth = 1;
                ctx.strokeRect(0, 0, 240, 140);

                ctx.fillStyle = 'white';
                ctx.font = 'bold 16px Segoe UI';
                ctx.textAlign = 'center';
                ctx.fillText(panel.title, 120, 35);

                ctx.font = 'bold 36px Segoe UI';
                ctx.fillText(typeof panel.value === 'number' ? panel.value.toLocaleString() : `${panel.value}%`, 120, 85);
                ctx.restore();
            });

            // Live analysis
            ctx.fillStyle = 'lime';
            ctx.shadowColor = 'lime';
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.arc(dashX + 150, dashY + 500, 10 + Math.sin(t * 8) * 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'white';
            ctx.font = '18px Segoe UI';
            ctx.textAlign = 'left';
            ctx.fillText('Live Analysis | Processing candidate...', dashX + 180, dashY + 510);

            // Tabs
            const tabY = dashY + 600;
            const tabs = ['Job Postings', 'Applications', 'Interviews'];
            tabs.forEach((tab, i) => {
                ctx.fillStyle = i === 0 ? '#3b82f6' : 'rgba(255,255,255,0.1)';
                ctx.fillRect(dashX + 100 + i * 160, tabY, 150, 45);
                ctx.fillStyle = 'white';
                ctx.font = 'bold 16px Segoe UI';
                ctx.textAlign = 'center';
                ctx.fillText(tab, dashX + 175 + i * 160, tabY + 32);
            });

            ctx.restore();
        }

        function animate() {
            time += 0.016;

            ctx.fillStyle = 'rgba(102, 126, 234, 0.03)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (time < 5) {
                phase = 0;
                drawLanding(time);
            } else if (time < 12) {
                phase = 1;
                const errorT = time - 5;
                if (errorT > 6) drawForm(errorT, true);
                else drawForm(errorT, false);
            } else {
                phase = 2;
                drawDashboard(time - 12);
            }

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
