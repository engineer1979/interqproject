<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATS Dashboard Animation</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas {
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            max-width: 100%;
            max-height: 100%;
        }
    </style>
</head>
<body>
    <canvas id="dashboardCanvas" width="1920" height="1080"></canvas>
    <script>
        const canvas = document.getElementById('dashboardCanvas');
        const ctx = canvas.getContext('2d');
        let startTime = Date.now();

        // Responsive resize
        function resize() {
            const rect = canvas.getBoundingClientRect();
            canvas.width = Math.min(1920, rect.width);
            canvas.height = Math.min(1080, rect.height * (1080 / 1920));
        }
        resize();
        window.addEventListener('resize', resize);

        const metrics = [
            { label: 'Candidates', value: 2847, max: 3000, color: '#3b82f6', x: 200, y: 200, type: 'count' },
            { label: 'Strong Hire', value: 87.3, max: 100, color: '#10b981', x: 600, y: 200, type: 'circle' },
            { label: 'Hire Rate', value: 94.2, max: 100, color: '#f59e0b', x: 1000, y: 200, type: 'bar' },
            { label: 'Active', value: 24, max: 50, color: '#ef4444', x: 1400, y: 200, type: 'pulse' }
        ];

        function drawOfficeBG(progress) {
            // Blurred office scene
            const gradient = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 0, canvas.width/2, canvas.height*0.7, canvas.width);
            gradient.addColorStop(0, 'rgba(30, 41, 59, 0.8)');
            gradient.addColorStop(1, 'rgba(15, 23, 42, 1)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Desk/tables
            ctx.fillStyle = 'rgba(75, 85, 99, 0.6)';
            ctx.fillRect(100 + Math.sin(progress*0.5)*20, canvas.height*0.6, 300, 150);
            ctx.fillRect(canvas.width - 400 + Math.cos(progress*0.3)*20, canvas.height*0.65, 300, 120);

            // Windows/light
            ctx.fillStyle = 'rgba(59, 130, 246, 0.3)';
            ctx.fillRect(50, 50, 200, 150);
            ctx.fillRect(canvas.width - 250, 80, 180, 120);
        }

        function drawMetric(metric, progress, isActive) {
            const animProgress = Math.min(1, progress * 1.5);
            const floatY = Math.sin(progress * 2 + metric.x) * 8;
            const glow = isActive ? 30 : 10;

            ctx.save();
            ctx.translate(metric.x, metric.y + floatY);
            ctx.shadowColor = metric.color;
            ctx.shadowBlur = glow * animProgress;

            // Card
            const cardGradient = ctx.createLinearGradient(0, 0, 0, 120);
            cardGradient.addColorStop(0, 'rgba(255,255,255,0.1)');
            cardGradient.addColorStop(1, 'rgba(255,255,255,0.03)');
            ctx.fillStyle = cardGradient;
            ctx.fillRect(0, 0, 250, 120);
            ctx.strokeStyle = 'rgba(255,255,255,0.2)';
            ctx.lineWidth = 1;
            ctx.strokeRect(0, 0, 250, 120);

            ctx.shadowBlur = 0;

            // Label
            ctx.fillStyle = 'white';
            ctx.font = 'bold 16px Segoe UI';
            ctx.textAlign = 'center';
            ctx.fillText(metric.label, 125, 25);

            if (metric.type === 'count') {
                const currentValue = Math.floor(animProgress * metric.value);
                ctx.font = 'bold 36px Segoe UI';
                ctx.fillText(currentValue.toLocaleString(), 125, 70);
            } else if (metric.type === 'circle') {
                const radius = 35;
                ctx.beginPath();
                ctx.arc(50, 60, radius, -Math.PI / 2, -Math.PI / 2 + (animProgress * metric.value / 100 * Math.PI * 2));
                ctx.strokeStyle = metric.color;
                ctx.lineWidth = 10;
                ctx.lineCap = 'round';
                ctx.stroke();

                ctx.beginPath();
                ctx.arc(50, 60, radius - 7, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,255,255,0.1)';
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.font = 'bold 24px Segoe UI';
                ctx.textAlign = 'center';
                ctx.fillStyle = metric.color;
                ctx.fillText(`${metric.value}%`, 50, 75);
            } else if (metric.type === 'bar') {
                ctx.fillStyle = metric.color;
                ctx.fillRect(20, 45, animProgress * metric.value * 2, 20);
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.lineWidth = 2;
                ctx.strokeRect(20, 45, 200, 20);
                ctx.font = 'bold 22px Segoe UI';
                ctx.fillStyle = 'white';
                ctx.fillText(`${metric.value}%`, 125, 68);
            } else if (metric.type === 'pulse') {
                const pulseScale = 1 + Math.sin(progress * 4) * 0.1 * animProgress;
                ctx.save();
                ctx.scale(pulseScale, pulseScale);
                ctx.font = 'bold 36px Segoe UI';
                ctx.fillText(metric.value.toString(), 125, 70);
                ctx.restore();
            }

            ctx.restore();
        }

        function drawNotification(x, y, text, delay, progress) {
            if (progress > delay) {
                const alpha = Math.min(1, (progress - delay) * 2);
                const slideIn = Math.min(1, (progress - delay) * 3) * 100;
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.fillStyle = 'rgba(16, 185, 129, 0.95)';
                ctx.fillRect(x + slideIn, y, 280, 50);
                ctx.fillStyle = 'white';
                ctx.font = 'bold 16px Segoe UI';
                ctx.textAlign = 'left';
                ctx.fillText(text, x + slideIn + 15, y + 32);
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.lineWidth = 1;
                ctx.strokeRect(x + slideIn, y, 280, 50);
                ctx.restore();
            }
        }

        function animate() {
            const elapsed = (Date.now() - startTime) * 0.001;
            const cycle = (elapsed % 20);

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Camera pan
            ctx.save();
            ctx.translate(Math.sin(elapsed * 0.3) * 20, Math.cos(elapsed * 0.2) * 10);

            drawOfficeBG(elapsed);

            // Live Analysis Panel
            const panelProgress = Math.min(1, cycle / 2);
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(50, 50, canvas.width - 100, 80);
            ctx.fillStyle = 'lime';
            ctx.beginPath();
            ctx.arc(70, 90, 8 + Math.sin(elapsed * 5) * 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = 'white';
            ctx.font = 'bold 20px Segoe UI';
            ctx.textAlign = 'left';
            ctx.fillText('Live Analysis | Processing candidate...', 90, 90);

            // Metrics (float + anim)
            metrics.forEach((metric, index) => {
                const prog = Math.min(1, (cycle - index * 3) / 4);
                const active = Math.abs(cycle - index * 5) < 2;
                drawMetric(metric, prog, active);
            });

            // Line graph for Hire Rate trend
            const graphX = 600;
            const graphY = 450;
            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            for (let i = 0; i < 10; i++) {
                ctx.lineTo(graphX + i * 30, graphY + Math.sin(elapsed + i * 0.5) * 20 * 0.5 + 20);
            }
            ctx.stroke();
            ctx.strokeStyle = '#f59e0b';
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.beginPath();
            for (let i = 0; i < 10; i++) {
                const h = Math.sin(elapsed * 2 + i * 0.3) * 30 + 30 * (94.2 / 100);
                ctx.lineTo(graphX + i * 30, graphY + h);
            }
            ctx.stroke();

            // Notifications
            drawNotification(200, 400, 'Resume reviewed', 2 + Math.sin(elapsed) * 0.5, cycle);
            drawNotification(800, 500, 'Interview scheduled', 8, cycle);

            ctx.restore();

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
