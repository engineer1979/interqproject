<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corporate Analytics Slideshow</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas {
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            max-width: 100%;
            max-height: 100%;
        }
        .live-overlay {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: bold;
            letter-spacing: 1px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .metric-highlight {
            position: absolute;
            font-size: 48px;
            font-weight: bold;
            color: #00ff88;
            text-shadow: 0 0 20px #00ff88;
            opacity: 0;
            transition: all 0.5s ease;
        }
    </style>
</head>
<body>
    <div class="live-overlay" id="liveOverlay">
        🔴 Live Analysis | Processing candidate...
    </div>
    <canvas id="slideshowCanvas" width="1920" height="1080"></canvas>

    <script>
        const canvas = document.getElementById('slideshowCanvas');
        const ctx = canvas.getContext('2d');
        const metrics = [
            { text: 'Candidates: 2,847', value: 2847, color: '#4facfe' },
            { text: 'Strong Hire: 87.3%', value: 87.3, color: '#00f2fe', type: 'progress' },
            { text: 'Hire Rate: 94.2%', value: 94.2, color: '#43e97b', type: 'progress' },
            { text: 'Active Status: 24/7', value: '24/7', color: '#fa709a' }
        ];
        let currentSlide = 0;
        let startTime = Date.now();
        const slideDuration = 4000; // 4s per slide
        const totalDuration = 16000; // 16s total

        // Scene setup: round table, 3 professionals
        function drawScene(progress) {
            ctx.fillStyle = '#2c1810'; // Table wood
            ctx.beginPath();
            ctx.arc(960, 650, 300, 0, Math.PI * 2);
            ctx.fill();

            // Laptops
            ctx.fillStyle = '#333';
            ctx.fillRect(700 + Math.sin(progress * 0.1) * 5, 550 + Math.cos(progress * 0.1) * 3, 150, 100);
            ctx.fillRect(960 + Math.sin(progress * 0.15) * 5, 550 + Math.cos(progress * 0.15) * 3, 150, 100);
            ctx.fillRect(1220 + Math.sin(progress * 0.2) * 5, 550 + Math.cos(progress * 0.2) * 3, 150, 100);

            // Professionals (simple stylized)
            drawPerson(750, 450, progress * 0.1);
            drawPerson(1010, 450, progress * 0.15);
            drawPerson(1270, 450, progress * 0.2);
        }

        function drawPerson(x, y, animProgress) {
            // Body
            ctx.fillStyle = '#4a5568';
            ctx.fillRect(x - 25, y + 50, 50, 150);
            // Head
            ctx.fillStyle = '#fbbf24';
            ctx.beginPath();
            ctx.arc(x, y, 30, 0, Math.PI * 2);
            ctx.fill();
            // Arms gesturing
            ctx.strokeStyle = '#4a5568';
            ctx.lineWidth = 8;
            ctx.beginPath();
            ctx.moveTo(x - 20, y + 40);
            ctx.lineTo(x - 50 + Math.sin(animProgress) * 20, y + 80);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x + 20, y + 40);
            ctx.lineTo(x + 50 + Math.cos(animProgress) * 20, y + 80);
            ctx.stroke();
        }

        function drawMetric(x, y, metric, highlightProgress) {
            // Background card
            const gradient = ctx.createLinearGradient(x, y, x + 400, y + 100);
            gradient.addColorStop(0, 'rgba(255,255,255,0.1)');
            gradient.addColorStop(1, 'rgba(255,255,255,0.05)');
            ctx.fillStyle = gradient;
            ctx.fillRect(x, y, 400, 100);

            ctx.fillStyle = 'white';
            ctx.font = 'bold 32px Segoe UI';
            ctx.textAlign = 'center';
            ctx.fillText(metric.text, x + 200, y + 40);

            if (metric.type === 'progress') {
                ctx.fillStyle = metric.color;
                ctx.fillRect(x + 50, y + 60, (metric.value / 100) * 300 * highlightProgress, 20);
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.lineWidth = 2;
                ctx.strokeRect(x + 50, y + 60, 300, 20);
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const elapsed = Date.now() - startTime;
            const slideProgress = (elapsed % totalDuration) / slideDuration;
            currentSlide = Math.floor((elapsed % totalDuration) / slideDuration);

            // Subtle camera zoom/pan
            ctx.save();
            const zoom = 1 + 0.05 * Math.sin(elapsed * 0.001);
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.scale(zoom, zoom);
            ctx.translate(-canvas.width / 2, -canvas.height / 2);

            // Soft lighting gradient overlay
            const lightGradient = ctx.createRadialGradient(960, 540, 0, 960, 540, 800);
            lightGradient.addColorStop(0, 'rgba(255,255,255,0.3)');
            lightGradient.addColorStop(1, 'rgba(0,0,0,0.5)');
            ctx.fillStyle = lightGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawScene(elapsed * 0.001);

            ctx.restore();

            // Highlight current metric
            if (currentSlide < metrics.length) {
                const highlightProg = Math.min(1, slideProgress * 2);
                const metricX = 760 + Math.sin(elapsed * 0.002) * 50;
                const metricY = 200 + Math.cos(elapsed * 0.0015) * 30;
                drawMetric(metricX, metricY, metrics[currentSlide], highlightProg);

                // Glow effect
                ctx.shadowColor = metrics[currentSlide].color;
                ctx.shadowBlur = 30 * highlightProg;
                ctx.fillStyle = 'white';
                ctx.font = 'bold 60px Segoe UI';
                ctx.textAlign = 'center';
                ctx.fillText(metrics[currentSlide].value.toString(), metricX + 200, metricY + 90);
                ctx.shadowBlur = 0;
            }

            requestAnimationFrame(animate);
        }

        // Resize canvas to fit
        function resize() {
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height * (1080 / 1920); // Maintain aspect
        }
        window.addEventListener('resize', resize);
        resize();

        animate();
    </script>
</body>
</html>
