<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Skill Assessments - Mobile Navigation Fixed</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "primary": "#ec5b13",
        "background-light": "#f8f6f6",
        "background-dark": "#1a1a2e"
      },
      fontFamily: {
        "display": ["Public Sans", "sans-serif"]
      },
      borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
    },
  },
}
</script>
<style>
body {
  font-family: "Public Sans", sans-serif;
}
.material-symbols-outlined {
  font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
}

/* FIXED: Dark bg readable text */
.metric-label, .text-slate-300, .text-slate-400, .text-slate-500 {
  color: #f1f5f9 !important; /* Light text for contrast */
  font-weight: 500 !important;
}

/* Product/Assessments/Solution Analysis - Black on light hover */
.group:hover .text-slate-300, .group:hover .text-slate-400 {
  color: #111827 !important;
}

.text-white {
  color: #ffffff !important;
}

.hover\:text-white:hover {
  color: #f8fafc !important;
}

.min-height-safe {
  min-height: max(884px, 100dvh);
}
</style>
</head>
<body class="bg-slate-900 font-display min-height-safe">
<div class="relative flex min-h-screen w-full flex-col bg-background-dark overflow-x-hidden">
<div class="flex items-center bg-background-dark/80 backdrop-blur-md p-6 justify-between border-b border-slate-800">
<div class="flex items-center gap-2">
<div class="bg-primary p-2 rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-white" style="font-size: 24px;">terminal</span>
</div>
<span class="text-white font-bold text-xl tracking-tight">SkillFlow</span>
</div>
<button class="flex items-center justify-center rounded-full h-10 w-10 bg-slate-800 text-white hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<div class="flex flex-col flex-1 px-6 py-8">
<nav class="flex-1">
<ul class="flex flex-col gap-2">
<li>
<a class="group flex h-14 items-center gap-4 rounded-xl px-4 bg-primary/10 text-primary transition-all" href="#">
<span class="material-symbols-outlined shrink-0" style="font-size: 24px;">inventory_2</span>
<span class="text-lg font-semibold leading-tight metric-label">Product</span>
<span class="material-symbols-outlined ml-auto opacity-0 group-hover:opacity-100 transition-opacity">chevron_right</span>
</a>
</li>
<li>
<a class="group flex h-14 items-center gap-4 rounded-xl px-4 hover:bg-slate-800 hover:text-white transition-all" href="#">
<span class="material-symbols-outlined shrink-0 metric-label group-hover:text-primary" style="font-size: 24px;">quiz</span>
<span class="text-lg font-medium leading-tight metric-label">Assessments</span>
<span class="material-symbols-outlined ml-auto opacity-0 group-hover:opacity-100 transition-opacity">chevron_right</span>
</a>
</li>
<li>
<a class="group flex h-14 items-center gap-4 rounded-xl px-4 hover:bg-slate-800 hover:text-white transition-all" href="#">
<span class="material-symbols-outlined shrink-0 metric-label group-hover:text-primary" style="font-size: 24px;">insights</span>
<span class="text-lg font-medium leading-tight metric-label">Solution Analysis</span>
<span class="material-symbols-outlined ml-auto opacity-0 group-hover:opacity-100 transition-opacity">chevron_right</span>
</a>
</li>
<li>
<a class="group flex h-14 items-center gap-4 rounded-xl px-4 hover:bg-slate-800 hover:text-white transition-all" href="#">
<span class="material-symbols-outlined shrink-0 metric-label group-hover:text-primary" style="font-size: 24px;">payments</span>
<span class="text-lg font-medium leading-tight metric-label">Pricing</span>
<span class="material-symbols-outlined ml-auto opacity-0 group-hover:opacity-100 transition-opacity">chevron_right</span>
</a>
</li>
</ul>
<div class="mt-10 pt-8 border-t border-slate-800">
<p class="px-4 text-xs font-bold uppercase tracking-widest metric-label mb-4">Account</p>
<ul class="flex flex-col gap-2">
<li>
<a class="flex h-12 items-center gap-4 rounded-xl px-4 hover:text-white transition-colors" href="#">
<span class="material-symbols-outlined shrink-0 metric-label" style="font-size: 20px;">settings</span>
<span class="text-base font-medium metric-label">Settings</span>
</a>
</li>
<li>
<a class="flex h-12 items-center gap-4 rounded-xl px-4 hover:text-white transition-colors" href="#">
<span class="material-symbols-outlined shrink-0 metric-label" style="font-size: 20px;">help_center</span>
<span class="text-base font-medium metric-label">Support Center</span>
</a>
</li>
</ul>
</div>
</nav>
<div class="mt-auto pt-8 flex flex-col gap-4">
<div class="flex items-center gap-4 bg-slate-800/50 p-4 rounded-2xl border border-slate-700/50">
<div class="flex items-center justify-center rounded-full bg-primary/20 text-primary shrink-0 size-12">
<span class="material-symbols-outlined">account_circle</span>
</div>
<div class="flex flex-col flex-1 min-w-0">
<p class="text-white text-sm font-bold truncate">Guest User</p>
<p class="text-slate-400 text-xs truncate metric-label">Sign in to sync progress</p>
</div>
<button class="text-slate-400 hover:text-white metric-label">
<span class="material-symbols-outlined">login</span>
</button>
</div>
<button class="w-full flex items-center justify-center rounded-xl h-14 bg-primary text-white text-base font-bold tracking-wide shadow-lg shadow-primary/20 hover:bg-primary/90 transition-all">
Get Started Free
</button>
</div>
</div>
<div class="absolute bottom-0 right-0 -z-10 w-64 h-64 bg-primary/5 rounded-full blur-3xl"></div>
<div class="absolute top-20 -left-10 -z-10 w-48 h-48 bg-blue-500/5 rounded-full blur-3xl"></div>
</div>
</body></html>
