<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATS Resume Screener - InterQ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 font-sans">
  <div id="root"></div>
  <script type="text/babel">
    // ATS App will go here
    const { useState, useEffect } = React;

    function App() {
      return (
        <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-50">
          <header className="bg-white shadow-sm border-b">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex justify-between items-center py-6">
                <div className="flex items-center">
                  <h1 className="text-3xl font-bold bg-gradient-to-r from-gray-900 to-slate-700 bg-clip-text text-transparent">
                    ATS Resume Screener
                  </h1>
                </div>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
            <ATSResumeScreener />
          </main>
        </div>
      );
    }

    function ATSResumeScreener() {
      return (
        <div>
          <div className="text-center mb-16">
            <h2 className="text-5xl font-black bg-gradient-to-r from-gray-900 to-slate-700 bg-clip-text text-transparent mb-6">
              Advanced Resume Screening
            </h2>
            <p className="text-xl text-gray-600 max-w-3xl mx-auto">
              Upload resumes, auto-score candidates, extract skills, and get AI-powered rankings. 
              Fully responsive & GDPR compliant.
            </p>
          </div>

          <ResumeUpload />
          <CandidateDashboard />
        </div>
      );
    }

    function ResumeUpload() {
      return (
        <div className="bg-white rounded-3xl shadow-2xl p-12 mb-16 border border-gray-100">
          <div className="max-w-2xl mx-auto text-center">
            <div className="w-24 h-24 bg-gradient-to-r from-blue-500 to-purple-600 rounded-3xl flex items-center justify-center mx-auto mb-8 shadow-2xl">
              <svg className="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M12 10l-5.5 5.5m0 0L7.5 18M7 12h10m-5.5-5.5L12 4.5" />
              </svg>
            </div>
            <h3 className="text-3xl font-bold text-gray-900 mb-4">Upload Resumes</h3>
            <p className="text-lg text-gray-600 mb-8">Supports PDF, DOCX, TXT. Auto-parsing with skill extraction & scoring.</p>
            <div className="space-y-4">
                <div className="border-4 border-dashed border-gray-300 rounded-3xl p-12 hover:border-blue-400 transition-all hover:shadow-xl cursor-pointer bg-gradient-to-b from-blue-50">
                  <input type="file" multiple className="hidden" id="resume-upload" />
                  <label htmlFor="resume-upload" className="cursor-pointer block w-full">
                    <div className="text-4xl mb-4">📁</div>
                    <p className="text-xl font-semibold text-gray-700">Drop resumes here or click to browse</p>
                    <p className="text-gray-500 mt-1">PDF, DOCX, TXT • Max 10MB each</p>
                  </label>
                </div>
            <div className="flex gap-4 mt-12 pt-12 border-t border-gray-200">
              <button className="flex-1 bg-gradient-to-r from-blue-600 to-purple-600 text-white py-4 px-8 rounded-2xl font-bold text-lg shadow-2xl hover:from-blue-700 hover:to-purple-700 transition-all hover:shadow-3xl hover:-translate-y-1">
                Parse & Score (AI)
              </button>
              <button className="flex-1 bg-white border-2 border-gray-200 text-gray-800 py-4 px-8 rounded-2xl font-bold text-lg hover:bg-gray-50 transition-all hover:shadow-xl">
                Load Demo Data
              </button>
            </div>
          </div>
        </div>
      );
    }

    function CandidateDashboard() {
      const [candidates, setCandidates] = useState([]);

      useEffect(() => {
        // Mock data
        setCandidates([
          {
            id: 1,
            name: 'Sarah Johnson',
            score: 92,
            match: 94,
            skills: ['React', 'Node.js', 'TypeScript', 'AWS'],
            status: 'Shortlisted',
            location: 'San Francisco',
            experience: '5+ years',
            photo: 'https://images.unsplash.com/photo-1494790108755-2616b612b786?w=100&h=100&fit=crop&round',
          },
          {
            id: 2,
            name: 'Michael Chen',
            score: 87,
            match: 89,
            skills: ['Python', 'Django', 'PostgreSQL', 'Docker'],
            status: 'Interview Scheduled',
            location: 'New York',
            experience: '4 years',
            photo: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=100&h=100&fit=crop&round',
          },
          // Add more demo
        ]);
      }, []);

      return (
        <div className="bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
          <div className="p-8 border-b border-gray-100">
            <div className="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4">
              <div>
                <h3 className="text-3xl font-bold text-gray-900">Candidate Pipeline</h3>
                <p className="text-lg text-gray-600 mt-1">92 applicants • Top 5 match score 94%</p>
              </div>
              <div className="flex gap-3">
                <button className="px-8 py-3 bg-gradient-to-r from-emerald-500 to-teal-600 text-white font-bold rounded-xl shadow-lg hover:from-emerald-600 hover:to-teal-700 transition-all">
                  Shortlist Top 10
                </button>
                <button className="px-8 py-3 bg-white border border-gray-300 text-gray-800 font-bold rounded-xl hover:bg-gray-50 transition-all shadow-sm">
                  Export CSV
                </button>
              </div>
            </div>
          </div>

          <div className="overflow-x-auto">
            <table className="w-full">
              <thead className="bg-gradient-to-r from-gray-50 to-gray-100">
                <tr>
                  <th className="px-8 py-6 text-left text-lg font-bold text-gray-900 border-b border-gray-200">Candidate</th>
                  <th className="px-6 py-6 text-left text-lg font-bold text-gray-900 border-b border-gray-200">Score</th>
                  <th className="px-6 py-6 text-left text-lg font-bold text-gray-900 border-b border-gray-200">Match %</th>
                  <th className="px-6 py-6 text-left text-lg font-bold text-gray-900 border-b border-gray-200">Skills</th>
                  <th className="px-6 py-6 text-left text-lg font-bold text-gray-900 border-b border-gray-200">Status</th>
                  <th className="px-6 py-6 text-left text-lg font-bold text-gray-900 border-b border-gray-200">Actions</th>
                </tr>
              </thead>
              <tbody>
                {candidates.map((candidate) => (
                  <tr key={candidate.id} className="hover:bg-gray-50 transition-colors border-b border-gray-100">
                    <td className="px-8 py-8">
                      <div className="flex items-center gap-4">
                        <img src={candidate.photo} alt={candidate.name} className="w-14 h-14 rounded-full ring-4 ring-gray-100 shadow-md" />
                        <div>
                          <h4 className="font-bold text-lg text-gray-900">{candidate.name}</h4>
                          <p className="text-sm text-gray-600">{candidate.location} • {candidate.experience}</p>
                        </div>
                      </div>
                    </td>
                    <td className="px-6 py-8">
                      <div className="bg-gradient-to-r from-green-400 to-emerald-500 px-4 py-2 rounded-full text-white font-bold text-lg shadow-lg">
                        {candidate.score}%
                      </div>
                    </td>
                    <td className="px-6 py-8">
                      <span className="bg-gradient-to-r from-blue-400 to-indigo-500 px-4 py-2 rounded-full text-white font-bold text-lg shadow-lg">
                        {candidate.match}%
                      </span>
                    </td>
                    <td className="px-6 py-8">
                      <div className="flex flex-wrap gap-2">
                        {candidate.skills.map((skill, i) => (
                          <span key={i} className="bg-blue-100 text-blue-800 px-3 py-1 rounded-full text-sm font-medium">
                            {skill}
                          </span>
                        ))}
                      </div>
                    </td>
                    <td className="px-6 py-8">
                      <span className="px-4 py-2 rounded-full font-bold text-sm bg-emerald-100 text-emerald-800 border border-emerald-200">
                        {candidate.status}
                      </span>
                    </td>
                    <td className="px-6 py-8">
                      <div className="flex gap-2">
                        <button className="p-2 hover:bg-blue-50 rounded-lg transition-all">
                          👁️ View
                        </button>
                        <button className="p-2 hover:bg-green-50 rounded-lg transition-all">
                          📧 Email
                        </button>
                        <button className="p-2 hover:bg-orange-50 rounded-lg transition-all">
                          📅 Schedule
                        </button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
